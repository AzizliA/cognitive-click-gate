<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cognitive Click Gate</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      min-height: 260px;
      background: #0f0f13;
      color: #e8e8ec;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
    }

    header {
      background: #1a1a24;
      padding: 14px 16px;
      border-bottom: 1px solid #2a2a3a;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header .icon { font-size: 20px; }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #c8c8d8;
      letter-spacing: 0.3px;
    }

    .section {
      padding: 14px 16px;
      border-bottom: 1px solid #1e1e2e;
    }

    .section h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6060a0;
      margin-bottom: 10px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat-card {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 6px;
      padding: 10px;
      text-align: center;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: #a0a0ff;
    }

    .stat-label {
      font-size: 11px;
      color: #6868a8;
      margin-top: 2px;
    }

    .wide { grid-column: 1 / -1; }

    .allow-color { color: #4caf85; }
    .block-color { color: #cf5a5a; }

    .footer {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }

    .btn-stats {
      background: #2a2a4a;
      color: #9090d0;
    }

    .btn-clear {
      background: #2a1a1a;
      color: #a06060;
    }

    #status {
      font-size: 11px;
      color: #5050a0;
      text-align: center;
      padding: 0 16px 10px;
    }
  </style>
</head>
<body>
  <header>
    <span class="icon">⚠</span>
    <h1>Cognitive Click Gate</h1>
  </header>

  <div class="section">
    <h2>Session Stats</h2>
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-value" id="total">—</div>
        <div class="stat-label">Total Clicks</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="avg-time">—</div>
        <div class="stat-label">Avg Decision (s)</div>
      </div>
      <div class="stat-card">
        <div class="stat-value allow-color" id="allows">—</div>
        <div class="stat-label">Allowed</div>
      </div>
      <div class="stat-card">
        <div class="stat-value block-color" id="blocks">—</div>
        <div class="stat-label">Blocked</div>
      </div>
      <div class="stat-card wide">
        <div class="stat-value" id="avg-score">—</div>
        <div class="stat-label">Avg Impulse Score</div>
      </div>
      <div class="stat-card wide">
        <div class="stat-value" id="ratio">—</div>
        <div class="stat-label">Allow Ratio</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <button class="btn btn-stats" id="open-stats">👉 View Stats</button>
    <button class="btn btn-clear" id="clear-stats">🗑 Clear</button>
  </div>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
